###################
### KEYBINDINGS ###
###################
# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = SUPER, space , exec, $launcher
bind = SUPER, return, exec, $terminal
bind = SUPER+alt, return, exec, [float;size 550 400;center] $terminal
bind = SUPER+shift, return, exec, ~/.config/hypr/open_partial_terminal.sh
bind = SUPER, Q, killactive,
bind = SUPER+shift, Q, exec, hyprctl kill 
bind = SUPER, D, exec, $fileManager
bind = SUPER, W, exec, $browser
bind = SUPER+alt, space, togglefloating,
bind = SUPER, E, exec, $editor
bind = SUPER, L, exec, hyprlock
bind = SUPER, J, layoutmsg, togglesplit # dwindle
bind = ctrl+alt, R, exec, ~/.config/waybar/reload_waybar.sh
bind = ctrl+shift, escape, exec, $activityManager
bind = SUPER, m, exec, $spotify
bind = SUPER, b, exec, $bluetooth

bind = ctrl+alt, P, exec, shutdown now

# Move focus with mainMod + arrow keys
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d
bind = Super+Shift, left, movewindow, l
bind = Super+Shift, right, movewindow, r
bind = Super+Shift, up, movewindow, u
bind = Super+Shift, down, movewindow, d

# Switch workspaces with mainMod + [0-9]
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

bind = ctrl+SUPER, left, workspace, -1
bind = ctrl+SUPER, right, workspace, +1

# Move active window to a workspace with mainMod + ALT + [0-9]
bind = SUPERalt, 1, movetoworkspace, 1
bind = SUPERalt, 2, movetoworkspace, 2
bind = SUPERalt, 3, movetoworkspace, 3
bind = SUPERalt, 4, movetoworkspace, 4
bind = SUPERalt, 5, movetoworkspace, 5
bind = SUPERalt, 6, movetoworkspace, 6
bind = SUPERalt, 7, movetoworkspace, 7
bind = SUPERalt, 8, movetoworkspace, 8
bind = SUPERalt, 9, movetoworkspace, 9
bind = SUPERalt, 0, movetoworkspace, 10

binde = Ctrl+Super+Shift, left, movetoworkspace, -1
binde = Ctrl+Super+Shift, right, movetoworkspace, +1

# Example special workspace (scratchpad)
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPERSHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# Move/resize windows
bindm = SUPER,Y, movewindow
bindm = SUPER,X, resizewindow
bind = SUPER, F, fullscreen, 0

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires spotify_player
bindl = SUPER, N, exec, spotify_player playback next
bindl = SUPER, P, exec, spotify_player playback play-pause
bindl = SUPER+Shift, N, exec, spotify_player playback previous

bind = , Print, exec, hyprcap -n -z -c -t 2000 -o ~/Pictures/Screenshots/ shot region
bind = SUPER, Print, exec, hyprcap -n -c -t 2000 -o ~/Pictures/Screenshots/ shot monitor:active
bind = SUPER+shift, R, exec, hyprcap -n -c -t 2000 -o ~/Video/Captures rec monitor:active


bindl = SUPER, L, exec, hyprlock

